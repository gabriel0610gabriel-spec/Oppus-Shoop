<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeuOne Shop</title>
    <style>
        /* Estilos Base do Site */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #050507; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* Estilização do Modal (Design Roxo) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-box {
            background: #8b1ff5; /* Cor roxa definida conforme o print */
            padding: 30px; border-radius: 20px; text-align: center;
            width: 90%; max-width: 400px; color: white; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .close-modal {
            position: absolute; top: 15px; right: 15px; cursor: pointer; 
            font-size: 24px; font-weight: bold; color: white;
        }
        .qr-code-container {
            background: white; padding: 15px; border-radius: 12px; 
            margin: 20px auto; display: inline-block;
        }
        .qr-code-img { width: 180px; height: 180px; object-fit: contain; }
        
        /* Botão de Compra */
        .btn-compra {
            background: #2563eb; color: white; border: none; padding: 12px 25px;
            border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div style="padding: 50px; text-align: center;">
        <h1>ZeuOne</h1>
        <p>Tools for Valorant and Unbans solutions ✨</p>
        <button class="btn-compra" onclick="abrirModal('R6 - 1 Dia', '30,00')">Comprar R6 - 1 Dia</button>
    </div>

    <div id="modalPagamento" class="modal-overlay">
        <div class="modal-box">
            <span class="close-modal" onclick="fecharModal()">✕</span>
            
            <h2 id="modalProdutoNome">Nome do Produto</h2>
            <div id="modalProdutoValor" style="font-size: 2rem; font-weight: bold; margin: 10px 0;">R$ 0,00</div>
            
            <p style="margin-bottom: 15px; line-height: 1.4;">
                Abra o app do seu banco, escolha "Pix QR Code" e escaneie a imagem abaixo para pagar.
            </p>
            
            <div class="qr-code-container">
                <img src="image_9ee727.jpg" alt="QR Code Pix" class="qr-code-img">
            </div>
            
            <p style="font-weight: bold; font-size: 0.9rem;">Após pagar, envie o comprovante no Discord.</p>
        </div>
    </div>

    <script>
        function abrirModal(nome, valor) {
            document.getElementById('modalProdutoNome').textContent = nome;
            document.getElementById('modalProdutoValor').textContent = "R$ " + valor;
            document.getElementById('modalPagamento').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalPagamento').style.display = 'none';
        }
    </script>
</body>
</html>
