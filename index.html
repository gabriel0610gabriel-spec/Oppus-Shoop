<section class="roulette-section">

  <h1>ROLETA DE DESCONTOS</h1>

  <p>
    Entre no nosso Discord para liberar a roleta 🎰
  </p>

  <a class="discord-btn" href="https://discord.gg/PAWq8m5hv" target="_blank">
    Entrar no Discord
  </a>

  <br><br>

  <button class="spin-btn" onclick="spinRoulette()">
    Girar Roleta
  </button>

  <div class="roulette" id="roulette">
    ?
  </div>

</section>

<style>

.roulette-section{
  text-align:center;
  padding:100px 20px;
}

.roulette-section h1{
  font-size:50px;
  margin-bottom:20px;
  color:#c084fc;
}

.roulette-section p{
  color:#aaa;
  margin-bottom:25px;
}

.discord-btn{
  display:inline-block;
  padding:15px 35px;
  background:#5865F2;
  color:white;
  text-decoration:none;
  border-radius:15px;
  font-weight:bold;
}

.spin-btn{
  margin-top:25px;
  padding:15px 40px;
  background:#9333ea;
  color:white;
  border:none;
  border-radius:15px;
  font-size:18px;
  cursor:pointer;
}

.roulette{
  width:250px;
  height:250px;
  border-radius:50%;
  border:8px solid #9333ea;
  margin:40px auto;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
  background:#12001f;
  box-shadow:0 0 30px #9333ea66;
}

</style>

<script>

let joinedDiscord = false;

document.querySelector(".discord-btn").addEventListener("click", () => {
  joinedDiscord = true;
});

function spinRoulette(){

  if(!joinedDiscord){
    alert("Entre no Discord primeiro!");
    return;
  }

  const prizes = [
    "5% OFF",
    "10% OFF",
    "20% OFF",
    "30% OFF"
  ];

  const randomPrize =
    prizes[Math.floor(Math.random() * prizes.length)];

  const roulette =
    document.getElementById("roulette");

  roulette.innerHTML = "🎰";

  setTimeout(() => {
    roulette.innerHTML = randomPrize;
  }, 2000);

}

</script>
